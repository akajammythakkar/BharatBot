<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BharatBot — Multilingual AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans:wght@400;500&family=Noto+Sans+Devanagari:wght@400;500&family=Noto+Sans+Gujarati:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0f1e;
      --glass: rgba(255,255,255,0.05);
      --glass-border: rgba(255,255,255,0.1);
      --user-grad: linear-gradient(135deg, #6366f1, #8b5cf6);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent3: #ec4899;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', 'Noto Sans', 'Noto Sans Devanagari', 'Noto Sans Gujarati', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    /* Animated background orbs */
    .orbs {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.18;
      animation: floatOrb 20s ease-in-out infinite;
    }
    .orb1 { width: 500px; height: 500px; background: #6366f1; top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -80px; right: -80px; animation-delay: -7s; }
    .orb3 { width: 300px; height: 300px; background: #ec4899; top: 40%; left: 60%; animation-delay: -14s; }

    @keyframes floatOrb {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33%       { transform: translate(30px, -40px) scale(1.05); }
      66%       { transform: translate(-20px, 30px) scale(0.95); }
    }

    /* Layout */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.04);
      border-bottom: 1px solid var(--glass-border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
    }
    .logo-wrap { display: flex; flex-direction: column; }
    .logo-title {
      font-size: 1.6rem;
      font-weight: 700;
      background: linear-gradient(90deg, #6366f1, #8b5cf6, #ec4899, #6366f1);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }
    @keyframes shimmer {
      to { background-position: 200% center; }
    }
    .logo-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      font-weight: 400;
      margin-top: 2px;
    }

    /* Language pills */
    .lang-pills {
      display: flex;
      gap: 8px;
      margin-left: auto;
      flex-wrap: wrap;
    }
    .lang-pill {
      cursor: pointer;
      border: 1.5px solid rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.04);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.82rem;
      font-weight: 500;
      transition: all 0.2s;
      user-select: none;
      white-space: nowrap;
    }
    .lang-pill:hover { border-color: var(--accent); color: var(--text); }
    .lang-pill.active {
      border-color: var(--accent);
      background: linear-gradient(135deg, rgba(99,102,241,0.25), rgba(139,92,246,0.25));
      color: #fff;
      box-shadow: 0 0 14px rgba(99,102,241,0.4);
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px 8px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }
    .chat-area::-webkit-scrollbar { width: 5px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 999px; }

    /* Bubbles */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      max-width: 800px;
      width: 100%;
    }
    .msg-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.bot  { align-self: flex-start; }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }
    .avatar.bot-av { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .avatar.user-av { background: linear-gradient(135deg, #8b5cf6, #ec4899); }

    .bubble-wrap { display: flex; flex-direction: column; gap: 4px; max-width: calc(100% - 50px); }

    .bubble {
      padding: 12px 18px;
      border-radius: 20px;
      line-height: 1.6;
      font-size: 0.92rem;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .bubble.user {
      background: var(--user-grad);
      border-radius: 24px 24px 4px 24px;
      color: #fff;
      box-shadow: 0 4px 20px rgba(99,102,241,0.35);
      align-self: flex-end;
    }
    .bubble.bot {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 4px 24px 24px 24px;
      color: var(--text);
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 20px;
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.2s infinite ease-in-out;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.5; }
      40%            { transform: translateY(-6px); opacity: 1; }
    }

    /* Sources */
    .sources-toggle {
      font-size: 0.75rem;
      color: var(--text-muted);
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      transition: color 0.2s;
    }
    .sources-toggle:hover { color: var(--accent2); }
    .sources-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 6px;
      overflow: hidden;
    }
    .sources-list.hidden { display: none; }
    .source-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 0.76rem;
      color: var(--text-muted);
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: flex-start;
    }
    .source-text {
      flex: 1;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }
    .score-badge {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: #fff;
      border-radius: 999px;
      padding: 2px 8px;
      font-size: 0.7rem;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* Input bar */
    .input-bar {
      flex-shrink: 0;
      padding: 14px 16px 20px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      background: rgba(255,255,255,0.03);
      border-top: 1px solid var(--glass-border);
    }
    .input-inner {
      max-width: 800px;
      margin: 0 auto;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: rgba(255,255,255,0.06);
      border: 1.5px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 10px 10px 10px 18px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-inner:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }
    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      resize: none;
      max-height: 140px;
      line-height: 1.5;
    }
    #userInput::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--user-grad);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 14px rgba(99,102,241,0.4);
    }
    .send-btn:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 6px 20px rgba(99,102,241,0.55); }
    .send-btn:active:not(:disabled) { transform: scale(0.96); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; }

    /* Toast */
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: #ef4444;
      color: #fff;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      transform: translateX(120%);
      transition: transform 0.3s ease;
      max-width: 320px;
    }
    .toast.show { transform: translateX(0); }

    /* Welcome */
    .welcome {
      text-align: center;
      padding: 40px 16px;
      color: var(--text-muted);
    }
    .welcome h2 {
      font-size: 1.3rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }
    .welcome p { font-size: 0.9rem; line-height: 1.6; }
  </style>
</head>
<body>
<div class="orbs">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
</div>

<div class="app">
  <header>
    <div class="logo-wrap">
      <div class="logo-title">BharatBot 🇮🇳</div>
      <div class="logo-sub">Multilingual AI Assistant</div>
    </div>
    <div class="lang-pills">
      <div class="lang-pill active" data-lang="en">🇬🇧 English</div>
      <div class="lang-pill" data-lang="hi">🇮🇳 हिंदी</div>
      <div class="lang-pill" data-lang="gu">🇮🇳 ગુજરાતી</div>
    </div>
  </header>

  <div class="chat-area" id="chatArea">
    <div class="welcome" id="welcome">
      <h2>Namaste! 🙏</h2>
      <p>Ask me anything in English, Hindi, or Gujarati.<br/>I'll search my knowledge base and respond in your language.</p>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-inner">
      <textarea id="userInput" rows="1" placeholder="Ask me anything..."></textarea>
      <button class="send-btn" id="sendBtn" title="Send">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="sg" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#fff"/>
              <stop offset="100%" stop-color="#e0d9ff"/>
            </linearGradient>
          </defs>
          <path d="M22 2L11 13" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="url(#sg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const toast = document.getElementById('toast');
  const welcome = document.getElementById('welcome');

  let currentLang = 'en';
  let isLoading = false;
  const history = [];

  const placeholders = {
    en: 'Ask me anything...',
    hi: 'कुछ भी पूछें...',
    gu: 'કંઈ પણ પૂછો...'
  };

  // Language pills
  document.querySelectorAll('.lang-pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.lang-pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      currentLang = pill.dataset.lang;
      userInput.placeholder = placeholders[currentLang];
    });
  });

  // Auto-resize textarea
  userInput.addEventListener('input', () => {
    userInput.style.height = 'auto';
    userInput.style.height = Math.min(userInput.scrollHeight, 140) + 'px';
  });

  // Send on Enter (Shift+Enter = newline)
  userInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  function scrollBottom() {
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 4000);
  }

  function addUserBubble(text) {
    if (welcome) welcome.style.display = 'none';
    const row = document.createElement('div');
    row.className = 'msg-row user';
    row.innerHTML = `
      <div class="avatar user-av">👤</div>
      <div class="bubble-wrap">
        <div class="bubble user">${escHtml(text)}</div>
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
  }

  function addTypingIndicator() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typingRow';
    row.innerHTML = `
      <div class="avatar bot-av">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble bot">
          <div class="typing-dots"><span></span><span></span><span></span></div>
        </div>
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
    return row;
  }

  function removeTypingIndicator() {
    const el = document.getElementById('typingRow');
    if (el) el.remove();
  }

  function addBotBubble(text, sources) {
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    let sourcesHtml = '';
    if (sources && sources.length > 0) {
      const cards = sources.map(s => `
        <div class="source-card">
          <div class="source-text">${escHtml(s.text.substring(0, 200))}</div>
          <div class="score-badge">${s.score}</div>
        </div>`).join('');
      sourcesHtml = `
        <div class="sources-toggle" onclick="toggleSources(this)">▶ Sources (${sources.length})</div>
        <div class="sources-list hidden">${cards}</div>`;
    }

    row.innerHTML = `
      <div class="avatar bot-av">🤖</div>
      <div class="bubble-wrap">
        <div class="bubble bot">${escHtml(text)}</div>
        ${sourcesHtml}
      </div>`;
    chatArea.appendChild(row);
    scrollBottom();
  }

  function toggleSources(el) {
    const list = el.nextElementSibling;
    const open = !list.classList.contains('hidden');
    list.classList.toggle('hidden', open);
    el.textContent = (open ? '▶' : '▼') + el.textContent.slice(1);
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/\n/g, '<br/>');
  }

  async function sendMessage() {
    const text = userInput.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    userInput.disabled = true;
    userInput.value = '';
    userInput.style.height = 'auto';

    addUserBubble(text);
    const typingRow = addTypingIndicator();

    try {
      const resp = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, language: currentLang })
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }

      const data = await resp.json();
      removeTypingIndicator();
      addBotBubble(data.response, data.sources);
      history.push({ role: 'user', text }, { role: 'bot', text: data.response });
    } catch (err) {
      removeTypingIndicator();
      showToast('Something went wrong. Please try again.');
      console.error(err);
    } finally {
      isLoading = false;
      sendBtn.disabled = false;
      userInput.disabled = false;
      userInput.focus();
    }
  }
</script>
</body>
</html>
