steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/bharatbot:$COMMIT_SHA', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/bharatbot:$COMMIT_SHA']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bharatbot
      - --image=gcr.io/$PROJECT_ID/bharatbot:$COMMIT_SHA
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=2Gi
      - --cpu=2
      - --set-env-vars=ZILLIZ_URI=$$ZILLIZ_URI,ZILLIZ_TOKEN=$$ZILLIZ_TOKEN,GEMINI_API_KEY=$$GEMINI_API_KEY
    secretEnv: ['ZILLIZ_URI', 'ZILLIZ_TOKEN', 'GEMINI_API_KEY']

images:
  - 'gcr.io/$PROJECT_ID/bharatbot:$COMMIT_SHA'
